projects_intro:
  title: "项目不是堆功能，而是逐步形成问题意识。"
  subtitle: "下面列出我目前最重要的项目。对我而言，项目的价值不只在于做出来，更在于它如何成为一个值得被研究的问题。"

projects:
  - title: "GrandMaster"
    subtitle: "Primary Project"
    image: "/images/agent-system.svg"
    image_alt: "Agent system"
    featured: true
    description: >-
      一个 long-horizon、governance-aware 的 multi-agent LLM research system。这原本是为 WorldQuant Brain 设计的量化自动化平台，
      但现在可以视为一个复杂环境中 agent evaluation、failure learning、evidence integrity 与 governed autonomy 的研究原型。
    tags:
      - "LLM Agents"
      - "Long-Horizon Evaluation"
      - "Failure Analysis"
      - "Governed Autonomy"
    bullets:
      - "关注多 Agent 系统在高成本、反馈稀疏环境中的长期行为。"
      - "强调 authority / intelligence separation 与 typed failure learning。"
      - "用 replay-based evaluation 判断系统是否真的在改进。"
    links:
      - label: "项目说明页"
        url: "/grandmaster/"
      - label: "Web Demo"
        url: "http://39.107.250.250/grand_master"
        external: true
  - title: "Augur"
    subtitle: "Runtime-Aware Agent"
    image: "/images/runtime-agent.svg"
    image_alt: "Runtime agent"
    description: >-
      一个 runtime-aware debugging agent 原型，将调试过程建模为 observation、tool use、verifier、reflection 组成的闭环，
      用于观察 agent 在真实可执行环境中的行为与失败模式。
    tags:
      - "Runtime-Aware"
      - "Verifier Loop"
      - "Trajectory Logging"
      - "Debugging"
    bullets:
      - "将调试从单轮 patch 生成推进到多步行为过程。"
      - "统一 runtime observation、tool result 与 verifier feedback。"
      - "更关注失败模式与行为分析，而不只是一次修对。"
    links:
      - label: "GitHub Repo"
        url: "https://github.com/UPwith-me/Augur-Runtime-Debugging-Agent"
        external: true
  - title: "跨模态攻击性指令过滤器"
    subtitle: "Ongoing Course Project"
    image: "/images/multimodal-safety.svg"
    image_alt: "Multimodal safety"
    description: "当前进行中的课程研究项目，聚焦多模态安全，主要涉及 benchmark 搭建、主流视觉语言模型评测，以及过滤算法设计。"
    tags:
      - "Multimodal"
      - "VLM Evaluation"
      - "Safety"
      - "Benchmark"
    bullets:
      - "围绕多模态攻击性指令过滤问题展开。"
      - "正在做 benchmark 搭建与主流 VLM 评测。"
      - "进一步强化我对多模态研究的兴趣。"

